# Naiad Agent — GitHub Actions Workflow
# Copy this file to .github/workflows/naiad.yml in your repository.
#
# Setup:
# 1. Install the Naiad GitHub App on your repository
# 2. (Optional) Set NAIAD_API_URL secret if not using https://v2.naiadai.com
#
# Authentication: Uses GitHub OIDC tokens — no NAIAD_API_KEY secret needed.
#
# Usage:
# - Use the Naiad web app to dispatch agents
# - Or manually dispatch from the Actions tab with a custom prompt

name: Naiad Agent

on:
  workflow_dispatch:
    inputs:
      thread_id:
        description: "Thread ID (set by platform)"
        required: false
        type: string
      prompt:
        description: "Instruction for the agent"
        required: false
        type: string
      attempt:
        description: "Attempt number (set by platform)"
        required: false
        type: string
        default: "1"
      model:
        description: "Model ID to use (set by platform)"
        required: false
        type: string
      head_sha:
        description: "PR head SHA for exact checkout (set by platform)"
        required: false
        type: string
      head_ref:
        description: "PR head branch name for local branch creation (set by platform)"
        required: false
        type: string
      head_repo:
        description: "Fork repo full name for fork PR checkout (set by platform)"
        required: false
        type: string
      pr_number:
        description: "PR number for concurrency (set by platform)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

# Prevent parallel runs on the same thread. Do NOT cancel in-progress runs —
# cancellation kills `if: always()` cleanup steps (result PATCH),
# which would leave threads stuck in RUNNING with no reconciliation worker to fix them.
# Instead, queue new runs behind the current one.
concurrency:
  group: naiad-${{ github.repository }}-${{ inputs.pr_number && format('pr-{0}', inputs.pr_number) || inputs.thread_id || github.ref }}
  cancel-in-progress: false

jobs:
  agent:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ (inputs.head_sha != '' && (inputs.head_repo == '' || inputs.head_repo == github.repository)) && inputs.head_sha || github.ref }}

      - name: Fetch fork HEAD (public fork PRs only)
        if: inputs.head_repo != '' && inputs.head_repo != github.repository
        run: |
          git fetch https://github.com/${{ inputs.head_repo }}.git ${{ inputs.head_sha }} || {
            echo "::error::Failed to fetch exact SHA ${{ inputs.head_sha }} from fork ${{ inputs.head_repo }}. Failing job — no mutable ref fallback."
            exit 1
          }
          git checkout ${{ inputs.head_sha }}

      - name: Create local branch at SHA (avoid detached HEAD)
        if: inputs.head_sha != ''
        run: |
          HEAD_REF="${{ inputs.head_ref }}"
          if [ -z "$HEAD_REF" ]; then
            echo "::error::head_ref input is required when head_sha is set."
            exit 1
          fi
          git checkout -B "$HEAD_REF" HEAD

      - name: Verify head SHA is still current (PR runs only)
        if: inputs.head_sha != '' && inputs.head_ref != ''
        uses: actions/github-script@v7
        with:
          script: |
            const repoFull = '${{ inputs.head_repo }}' || '${{ github.repository }}';
            const [owner, repo] = repoFull.split('/');
            const ref = 'heads/${{ inputs.head_ref }}';
            try {
              const { data } = await github.rest.git.getRef({ owner, repo, ref });
              const currentSha = data.object?.sha;
              if (!currentSha) {
                core.setFailed('Branch ${{ inputs.head_ref }} no longer exists.');
                return;
              }
              if (currentSha !== '${{ inputs.head_sha }}') {
                core.setFailed(
                  'PR head SHA has changed since this run was queued ' +
                  '(expected ${{ inputs.head_sha }}, got ' + currentSha + '). ' +
                  'Failing — mention me again to retry with current code.'
                );
              }
            } catch (error) {
              if (error.status === 404) {
                core.setFailed('Branch ${{ inputs.head_ref }} no longer exists. The PR branch may have been deleted.');
              } else {
                core.setFailed('Failed to verify remote head SHA: ' + error.message);
              }
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Naiad CLI
        run: npm install -g naiad-cli

      - name: Write platform prompt
        if: inputs.thread_id != '' && inputs.thread_id != null && inputs.prompt != '' && inputs.prompt != null
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/naiad-prompt.txt', context.payload.inputs.prompt || '');

      - name: Construct prompt
        id: prompt
        if: inputs.thread_id == '' || inputs.thread_id == null
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prompt = context.payload.inputs.prompt;
            const contextJson = JSON.stringify({
              repo: context.repo.owner + '/' + context.repo.repo,
              ref: context.ref,
              sha: context.sha
            });

            fs.writeFileSync('/tmp/naiad-prompt.txt', prompt);

            core.setOutput('context', contextJson);

      - name: Sanitize runner environment
        run: |
          # Save credentials to a protected location for post-agent steps
          CRED_DIR=$(mktemp -d)
          chmod 700 "$CRED_DIR"
          git config --get http.https://github.com/.extraheader > "$CRED_DIR/git-extraheader" 2>/dev/null || true
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" > "$CRED_DIR/oidc-token"
          echo "$ACTIONS_ID_TOKEN_REQUEST_URL" > "$CRED_DIR/oidc-url"
          echo "CRED_DIR=$CRED_DIR" >> "$GITHUB_OUTPUT"

          # Strip git credentials from the environment the agent will inherit
          git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true

          # Note: ACTIONS_ID_TOKEN_REQUEST_* vars are NOT blanked here — the parent
          # naiad CLI needs them for OIDC bootstrap. They are stripped from the pi
          # child process via BLOCKED_ENV_VARS in launcher.ts.

          # Blank GitHub tokens via GITHUB_ENV so they persist to subsequent steps
          echo "GITHUB_TOKEN=" >> "$GITHUB_ENV"
          echo "GH_TOKEN=" >> "$GITHUB_ENV"
        id: sanitize

      - name: Run agent
        id: agent
        env:
          NAIAD_API_URL: ${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}
          NAIAD_ATTEMPT: ${{ inputs.attempt || '1' }}
          NAIAD_PUBLIC_REPO: ${{ github.event.repository.visibility != 'private' && 'true' || '' }}
        run: |
          # Close GHA side channels (public repo leak prevention)
          export GITHUB_STEP_SUMMARY=/dev/null
          export GITHUB_OUTPUT=/dev/null
          export GITHUB_ENV=/dev/null
          export GITHUB_PATH=/dev/null

          THREAD_ID="${{ inputs.thread_id }}"
          ATTEMPT="${{ inputs.attempt || '1' }}"
          MODEL_ID="${{ inputs.model }}"

          if [ -n "$THREAD_ID" ]; then
            # Resume mode: platform already created thread/session
            ARGS=(
              --thread "$THREAD_ID"
              --source github
              --trigger workflow_dispatch
              --output /tmp/naiad-result.json
            )

            if [ -n "$MODEL_ID" ]; then
              ARGS+=(--model "$MODEL_ID")
            fi

            if [ "$NAIAD_PUBLIC_REPO" = "true" ]; then
              # Suppress agent output on public repos — only emit allowlisted status lines
              # Use PIPESTATUS to preserve agent exit code through the filter pipe
              set -o pipefail
              { naiad exec "${ARGS[@]}" --prompt-file /tmp/naiad-prompt.txt 2>/dev/null || \
                naiad exec "${ARGS[@]}" "Continue from where the previous session left off."; } 2>&1 | { grep -E '^\[naiad\]' || true; }
            else
              naiad exec "${ARGS[@]}" --prompt-file /tmp/naiad-prompt.txt 2>/dev/null || \
              naiad exec "${ARGS[@]}" "Continue from where the previous session left off."
            fi
          else
            # Fresh run
            ARGS=(
              --prompt-file /tmp/naiad-prompt.txt
              --source github
              --trigger workflow_dispatch
              --context '${{ steps.prompt.outputs.context }}'
              --output /tmp/naiad-result.json
            )

            if [ -n "$MODEL_ID" ]; then
              ARGS+=(--model "$MODEL_ID")
            fi

            if [ "$NAIAD_PUBLIC_REPO" = "true" ]; then
              # Suppress agent output on public repos — only emit allowlisted status lines
              set -o pipefail
              naiad exec "${ARGS[@]}" 2>&1 | { grep -E '^\[naiad\]' || true; }
            else
              naiad exec "${ARGS[@]}"
            fi
          fi

      - name: Restore credentials
        if: always()
        run: |
          CRED_DIR="${{ steps.sanitize.outputs.CRED_DIR }}"
          if [ -n "$CRED_DIR" ] && [ -d "$CRED_DIR" ]; then
            HEADER=$(cat "$CRED_DIR/git-extraheader" 2>/dev/null || true)
            if [ -n "$HEADER" ]; then
              git config http.https://github.com/.extraheader "$HEADER"
            fi
            OIDC_TOKEN=$(cat "$CRED_DIR/oidc-token" 2>/dev/null || true)
            OIDC_URL=$(cat "$CRED_DIR/oidc-url" 2>/dev/null || true)
            if [ -n "$OIDC_TOKEN" ]; then
              echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=$OIDC_TOKEN" >> "$GITHUB_ENV"
            fi
            if [ -n "$OIDC_URL" ]; then
              echo "ACTIONS_ID_TOKEN_REQUEST_URL=$OIDC_URL" >> "$GITHUB_ENV"
            fi
            rm -rf "$CRED_DIR"
          fi

      - name: Update thread with result
        if: always()
        env:
          NAIAD_API_URL: ${{ secrets.NAIAD_API_URL || 'https://v2.naiadai.com' }}
          NAIAD_API_KEY: ${{ secrets.NAIAD_API_KEY }}
        run: |
          if [ ! -f /tmp/naiad-result.json ]; then
            exit 0
          fi

          THREAD_ID=$(jq -r '.thread_id // empty' /tmp/naiad-result.json)
          if [ -z "$THREAD_ID" ]; then
            exit 0
          fi

          ATTEMPT="${{ inputs.attempt || '1' }}"

          # Determine auth token: prefer API key, fall back to OIDC
          AUTH_TOKEN=""
          if [ -n "$NAIAD_API_KEY" ]; then
            AUTH_TOKEN="$NAIAD_API_KEY"
          elif [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            # Request OIDC token from GitHub
            OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${NAIAD_API_URL}" | jq -r '.value // empty')
            if [ -n "$OIDC_TOKEN" ]; then
              # Exchange OIDC token for scoped bearer
              AUTH_RESPONSE=$(curl -sS -X POST "${NAIAD_API_URL}/api/v1/agents/auth" \
                -H "Content-Type: application/json" \
                -d "{\"oidc_token\": \"${OIDC_TOKEN}\", \"thread_id\": \"${THREAD_ID}\", \"attempt\": ${ATTEMPT}}" 2>/dev/null)
              AUTH_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token // empty')
            fi
          fi

          if [ -z "$AUTH_TOKEN" ]; then
            echo "::warning::No auth method available to update thread status"
            exit 0
          fi

          RAW_STATUS=$(jq -r '.status // "FAILED"' /tmp/naiad-result.json)
          if [ "$RAW_STATUS" != "COMPLETED" ]; then
            RAW_STATUS="FAILED"
          fi

          RESULT=$(jq -n --arg status "$RAW_STATUS" '{status: $status}')

          curl -s -X PATCH "${NAIAD_API_URL}/api/v1/threads/${THREAD_ID}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"status\": \"${RAW_STATUS}\", \"attempt\": ${ATTEMPT}, \"result\": ${RESULT}}" || true
